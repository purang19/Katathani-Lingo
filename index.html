<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Katathani Lingo — Learn. Practice. Serve.</title>

<meta name="theme-color" content="#F6F1E8">
<meta name="description" content="Katathani Lingo — Learn. Practice. Serve. Service English for Katathani Collection staff.">

<!-- iOS: make it behave like an app once added to the home screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lingo">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">

<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-192.png">

<!-- Fonts load when online and are cached for offline by the service worker.
     The fallbacks below mean the app still looks right with no connection. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap">

<style>
  html, body {
    margin: 0; padding: 0;
    background: #F6F1E8;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }
  /* Respect the notch and the home indicator */
  #root { padding-bottom: env(safe-area-inset-bottom); }

  /* Shown until React boots, and if it never does */
  #boot {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px;
    font-family: Georgia, serif; color: #0E6E63;
    background: #F6F1E8;
  }
  #boot b { font-size: 20px; font-weight: 700; }
  #boot span { font-family: system-ui, sans-serif; font-size: 13px; color: #5C6D6C; }
</style>
</head>
<body>

<div id="boot"><b>Katathani Lingo</b><span>Learn. Practice. Serve.</span></div>
<div id="root"></div>

<script>
/* ------------------------------------------------------------------
   Storage.
   Inside a Claude artifact, window.storage already exists.
   As a real web page it does not — so use localStorage, which is the
   correct tool here: progress lives on the staff member's own phone,
   survives closing the browser, and needs no account and no server.
   ------------------------------------------------------------------ */
if (!window.storage) {
  window.storage = {
    get: async (k) => {
      const v = localStorage.getItem(k);
      if (v === null) throw new Error("not found");
      return { key: k, value: v };
    },
    set: async (k, v) => { localStorage.setItem(k, v); return { key: k, value: v }; },
    delete: async (k) => { localStorage.removeItem(k); return { key: k, deleted: true }; },
    list: async (prefix) => ({
      keys: Object.keys(localStorage).filter((k) => !prefix || k.startsWith(prefix))
    })
  };
}
</script>

<script src="./vendor-react.js"></script>
<script src="./vendor-react-dom.js"></script>
<script src="./app.js"></script>

<script>
  // React has rendered — clear the boot screen.
  var boot = document.getElementById("boot");
  if (boot) boot.remove();

  // Cache everything for offline use. Needs HTTPS (GitHub Pages gives it).
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./sw.js").catch(function () {
        // No service worker (e.g. opened as a local file). The app still works online.
      });
    });
  }
</script>
</body>
</html>
